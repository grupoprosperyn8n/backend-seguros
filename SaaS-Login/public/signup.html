<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Portal | Registro</title>
    <link rel="stylesheet" href="style.css?v=2" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      .register-link {
        margin-top: 15px;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-dim);
      }
      .register-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
      .register-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <main class="login-container register-container">
      <form id="registerForm" class="login-card two-column-form">
        <header>
          <h1>Crear Cuenta</h1>
          <p>Regístrate para acceder al portal</p>
        </header>

        <!-- Row 1 -->
        <div class="input-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Juan" required />
        </div>

        <div class="input-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Pérez" required />
        </div>

        <!-- Row 2 (Full Width) -->
        <div class="input-group full-width">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="ejemplo@saas.com" required />
        </div>

        <!-- Row 3 -->
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6" />
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirmar Contraseña</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6" />
        </div>

        <button type="submit" id="registerBtn">
          <span class="btn-text">Registrarse</span>
          <div class="loader"></div>
        </button>

        <div class="register-link">
          <p>¿Ya tienes cuenta? <a href="https://sistema-gestion-login.surge.sh/">Inicia Sesión</a></p>
        </div>

        <footer id="message" class="hidden"></footer>
      </form>
    </main>

    <script src="register.js"></script>
  </body>
</html>
