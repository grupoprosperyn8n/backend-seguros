<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Portal | Autogestión</title>
    <!-- Mismos estilos base resguardando la lógica de diseño -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="portal-body">
    <!-- El fondo de pantalla ya está definido en style.css para todo el body,
         y toma overlay o degradado según configuración -->
    <div class="dashboard-layout">
        <header class="dashboard-header glass-panel">
            <div class="dh-left">
                <div class="dh-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </div>
                <div class="dh-titles">
                    <h1>Portal de Autogestión</h1>
                    <p>Bienvenido a su portal personal</p>
                </div>
            </div>
            <div class="dh-right">
                <div class="quick-actions">
                    <a href="https://seguros-app-linktree.surge.sh/?modal=siniestro" class="action-btn-small badge-green" target="_blank" title="Denunciar Siniestro">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        <span>Denunciar Siniestro</span>
                    </a>
                    <a href="https://wa.me/message/TU_LINK_WSP" class="action-btn-small badge-green" target="_blank" title="WhatsApp Asesoría">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        <span>WhatsApp</span>
                    </a>
                    <a href="#" class="action-btn-small badge-purple" target="_blank" title="Agente IA Online">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>
                        <span>Asesor IA</span>
                    </a>
                </div>
                <div class="dh-user">
                    <strong id="user-display-name">Cargando...</strong>
                    <span>Cliente</span>
                </div>
                <button type="button" id="logoutBtn" class="logout-btn action-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Salir
                </button>
            </div>
        </header>

        <nav class="dashboard-nav glass-panel">
            <button type="button" class="tab-btn active" data-target="perfil">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Mi Perfil
            </button>
            <button type="button" class="tab-btn" data-target="polizas">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> Pólizas
            </button>
            <button type="button" class="tab-btn" data-target="gestiones">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg> Gestiones
            </button>
            <button type="button" class="tab-btn" data-target="accidentes">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M5 11V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"></path></svg> Accidentes
            </button>
            <button type="button" class="tab-btn" data-target="robo_oc">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> Robo OC
            </button>
            <button type="button" class="tab-btn btn-highlight" data-target="robo_incendio">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c-2.2-.6-3.7-2.7-3.6-5a5 5 0 1 1 9.2 0c.1 2.3-1.4 4.4-3.6 5a2.5 2.5 0 0 0 2.5 2.5"></path><path d="M12 2v2"></path><path d="M12 18v4"></path></svg> Robo/Incendio
            </button>
        </nav>

        <main class="dashboard-main">
            <div id="loading-indicator" class="loading-container glass-panel">
                <div class="loader-circle"></div>
                <p>Sincronizando información de sus pólizas y denuncias...</p>
            </div>

            <div id="content-area" class="content-area hidden">
                <!-- Data injected via JS -->
                 <div id="tab-perfil" class="tab-pane active"></div>
                 <div id="tab-polizas" class="tab-pane"></div>
                 <div id="tab-gestiones" class="tab-pane"></div>
                 <div id="tab-accidentes" class="tab-pane"></div>
                 <div id="tab-robo_oc" class="tab-pane"></div>
                 <div id="tab-robo_incendio" class="tab-pane"></div>
            </div>
        </main>
    </div>

    <!-- Global Details Modal -->
    <div id="portal-detail-modal" class="portal-modal-overlay">
        <div class="portal-modal">
            <div class="portal-modal-header">
                <h2 id="pdm-title">Detalles</h2>
                <button type="button" class="portal-modal-close" id="pdm-close" aria-label="Cerrar modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="portal-modal-body" id="pdm-body">
                <!-- Inyectado via JS -->
            </div>
        </div>
    </div>

    <script src="portal.js"></script>
</body>
</html>
